name: Publish npm package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure modern npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Gate — pack + README (AD-2 / AD-6)
        run: npm run prepack:check

      - name: Tag / package.json version must match
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      # Auth: npm Trusted Publishing (OIDC). Requires package Settings → Trusted
      # Publisher → GitHub: edyrkaj / openwakeword_wasm / publish.yml.
      # Do not set NODE_AUTH_TOKEN here (forces token path → EOTP with 2FA).
      - name: Publish
        run: npm publish --access public

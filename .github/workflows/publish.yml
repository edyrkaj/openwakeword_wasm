name: Publish npm package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure modern npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Gate — pack + README (AD-2 / AD-6)
        run: npm run prepack:check

      - name: Tag / package.json version must match
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      # Do NOT set NODE_AUTH_TOKEN — that forces the legacy token path and can
      # reintroduce EOTP. OIDC trusted publishing is preferred when configured.
      - name: Publish
        run: npm publish --access public
